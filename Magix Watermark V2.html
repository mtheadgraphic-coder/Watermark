<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Magix Watermark Pro by Ginny</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Anuphan:wght@300;400;600&family=Kanit:wght@300;400;600&family=Prompt:wght@300;400;600&family=Sarabun:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>

    <style>
        body { font-family: 'Prompt', sans-serif; background-color: #f3f4f6; }
        .canvas-container { margin: 0 auto; box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1); }
        .tool-btn:active { transform: scale(0.95); }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        .loading-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.9); z-index: 50; justify-content: center; align-items: center; flex-direction: column; }
        
        /* Drag & Drop Zone Active State */
        .drag-active { border-color: #9333ea !important; background-color: #faf5ff !important; transform: scale(1.02); }
    </style>
</head>
<body class="h-screen flex flex-col overflow-hidden text-slate-800">

    <div id="loading" class="loading-overlay">
        <div class="animate-spin rounded-full h-16 w-16 border-t-4 border-b-4 border-purple-600 mb-4"></div>
        <h2 class="text-xl font-bold text-purple-700" id="loadingText">กำลังประมวลผล...</h2>
    </div>

    <header class="bg-white border-b border-gray-200 px-6 py-3 flex justify-between items-center z-10">
        <div class="flex items-center gap-3">
            <div class="bg-gradient-to-tr from-purple-600 to-pink-500 text-white p-2 rounded-lg shadow-lg">
                <i class="fa-solid fa-wand-magic-sparkles text-xl"></i>
            </div>
            <h1 class="text-xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-purple-600 to-pink-500">
                Magix Watermark <span class="text-xs bg-gray-100 text-gray-500 px-2 py-0.5 rounded ml-2">Pro</span>
            </h1>
        </div>
        <div class="flex gap-2">
            <button onclick="document.getElementById('backupInput').click()" class="px-4 py-2 text-sm bg-gray-100 rounded-lg hover:bg-gray-200 tool-btn"><i class="fa-solid fa-upload mr-1"></i> Restore</button>
            <input type="file" id="backupInput" accept=".json" class="hidden" onchange="restoreData(this)">
            <button onclick="backupData()" class="px-4 py-2 text-sm text-white bg-slate-600 rounded-lg hover:bg-slate-700 tool-btn"><i class="fa-solid fa-download mr-1"></i> Backup</button>
        </div>
    </header>

    <div class="flex flex-1 overflow-hidden">
        
        <aside class="w-80 bg-white border-r border-gray-200 flex flex-col overflow-y-auto p-5 gap-5 shadow-sm z-10">
            
            <div>
                <h3 class="font-semibold text-gray-700 border-b pb-2 mb-2"><i class="fa-regular fa-file-pdf mr-2 text-purple-500"></i>1. อัปโหลดเอกสาร</h3>
                <label id="dropZone" 
                       class="flex flex-col items-center justify-center w-full h-32 border-2 border-dashed border-gray-300 rounded-xl cursor-pointer bg-gray-50 transition-all duration-200"
                       ondragover="handleDragOver(event)" ondragleave="handleDragLeave(event)" ondrop="handleDrop(event)">
                    <div class="flex flex-col items-center justify-center pt-5 pb-6 pointer-events-none">
                        <i class="fa-solid fa-cloud-arrow-up text-3xl text-gray-400 mb-2"></i>
                        <p class="mb-1 text-sm text-gray-500 font-semibold">คลิก หรือ ลากไฟล์มาวาง</p>
                        <p class="text-xs text-gray-400">PDF, JPG, PNG</p>
                    </div>
                    <input type="file" id="fileInput" class="hidden" accept=".pdf, .jpg, .jpeg, .png" onchange="handleFileSelect(this.files[0])" />
                </label>
                
                <div id="pageNav" class="hidden mt-3 p-2 bg-purple-50 rounded-lg border border-purple-100">
                    <div class="flex items-center justify-between mb-2">
                        <button onclick="changePage(-1)" class="w-8 h-8 rounded-full bg-white shadow hover:bg-purple-200 tool-btn"><i class="fa-solid fa-chevron-left"></i></button>
                        <span class="text-sm font-bold text-purple-800">หน้า <span id="pageNum">1</span> / <span id="pageCount">--</span></span>
                        <button onclick="changePage(1)" class="w-8 h-8 rounded-full bg-white shadow hover:bg-purple-200 tool-btn"><i class="fa-solid fa-chevron-right"></i></button>
                    </div>
                    <label class="flex items-center justify-center gap-2 cursor-pointer bg-white py-1.5 rounded border border-purple-200 hover:bg-purple-50 transition-colors">
                        <input type="checkbox" id="applyAllCheck" class="w-4 h-4 accent-purple-600 rounded">
                        <span class="text-xs font-medium text-gray-700">ใส่ลายน้ำนี้ทุกหน้า (Global)</span>
                    </label>
                </div>
            </div>

            <div>
                <h3 class="font-semibold text-gray-700 border-b pb-2 mb-2"><i class="fa-solid fa-layer-group mr-2 text-purple-500"></i>2. เพิ่มลายน้ำ</h3>
                <div class="grid grid-cols-2 gap-2 mb-3">
                    <button onclick="addText()" class="tool-btn py-2 px-3 bg-purple-100 text-purple-700 rounded-lg hover:bg-purple-200 font-medium text-sm"><i class="fa-solid fa-font mr-1"></i> ข้อความ</button>
                    <label class="tool-btn py-2 px-3 bg-pink-100 text-pink-700 rounded-lg hover:bg-pink-200 font-medium text-sm text-center cursor-pointer">
                        <i class="fa-regular fa-image mr-1"></i> รูปภาพ
                        <input type="file" id="watermarkImageInput" class="hidden" accept="image/*" onchange="addImage(this)">
                    </label>
                </div>

                <div id="objectControls" class="hidden bg-slate-50 p-3 rounded-lg border border-gray-200 space-y-3">
                    <div class="flex justify-between items-center">
                        <span class="text-xs font-bold text-slate-500 uppercase">ปรับแต่ง</span>
                        <button onclick="deleteActiveObject()" class="text-red-500 hover:text-red-700 text-xs"><i class="fa-solid fa-trash"></i> ลบ</button>
                    </div>
                    
                    <div id="fontControlBox" class="hidden">
                        <label class="text-xs text-gray-500 block mb-1">ฟอนต์:</label>
                        <select id="fontFamilyControl" class="w-full text-sm border-gray-300 rounded bg-white px-2 py-1">
                            <option value="Sarabun">Sarabun (สารบัญ)</option>
                            <option value="Anuphan">Anuphan (อนุพันธ์)</option>
                            <option value="Kanit">Kanit (คณิต)</option>
                            <option value="Prompt">Prompt (พร้อม)</option>
                        </select>
                    </div>

                    <div class="flex items-center gap-2">
                        <span class="text-xs w-8">โปร่ง:</span>
                        <input type="range" id="opacityControl" min="0.1" max="1" step="0.1" value="1" class="flex-1 accent-purple-600 h-2">
                    </div>
                    <div class="flex items-center gap-2">
                        <span class="text-xs w-8">สี:</span>
                        <input type="color" id="colorControl" class="flex-1 h-6 rounded cursor-pointer">
                    </div>
                </div>
            </div>

            <div class="flex-1 min-h-[100px]">
                <h3 class="font-semibold text-gray-700 border-b pb-2 mb-2"><i class="fa-solid fa-floppy-disk mr-2 text-purple-500"></i>3. จำรูปแบบ</h3>
                <div class="flex gap-2 mb-2">
                    <input type="text" id="templateName" placeholder="ชื่อ..." class="flex-1 px-3 py-1 text-sm border rounded focus:ring-2 focus:ring-purple-400">
                    <button onclick="saveTemplate()" class="bg-purple-600 text-white px-3 py-1 rounded text-sm hover:bg-purple-700">บันทึก</button>
                </div>
                <div id="templateList" class="space-y-1 overflow-y-auto max-h-40"></div>
            </div>

            <div class="bg-slate-800 text-white p-4 rounded-xl shadow-lg -mx-2 mb-2">
                <h3 class="font-semibold mb-3 text-yellow-400"><i class="fa-solid fa-file-export mr-2"></i>Export (High Quality)</h3>
                <div class="grid grid-cols-2 gap-2 mb-3 text-sm">
                    <select id="exportFormat" class="bg-slate-700 rounded px-2 py-1 border-none text-white">
                        <option value="pdf">PDF</option>
                        <option value="jpg">JPG</option>
                        <option value="png">PNG</option>
                    </select>
                    <select id="exportRangeType" class="bg-slate-700 rounded px-2 py-1 border-none text-white" onchange="toggleRangeInput()">
                        <option value="all">ทุกหน้า</option>
                        <option value="current">หน้าปัจจุบัน</option>
                        <option value="custom">กำหนดเอง</option>
                    </select>
                </div>
                <input type="text" id="customRangeInput" placeholder="เช่น 1, 3-5" class="hidden w-full bg-slate-700 rounded px-2 py-1 mb-3 text-white text-sm border border-slate-600">
                <button onclick="exportFile()" class="w-full py-2 bg-gradient-to-r from-yellow-500 to-orange-500 text-slate-900 font-bold rounded-lg hover:brightness-110 tool-btn">
                    บันทึกไฟล์ (100% Quality)
                </button>
            </div>

        </aside>

        <main class="flex-1 bg-gray-200 overflow-auto flex justify-center p-8 relative">
            <div id="welcomeMessage" class="absolute inset-0 flex flex-col items-center justify-center text-gray-400 pointer-events-none z-0">
                <i class="fa-solid fa-wand-magic-sparkles text-6xl mb-4 opacity-20"></i>
                <p>ลากไฟล์มาวางตรงนี้ก็ได้นะ</p>
            </div>
            <div class="relative z-10 shadow-2xl">
                 <canvas id="c"></canvas>
            </div>
        </main>
    </div>

    <script>
        // --- Variables ---
        let canvas;
        let pdfDoc = null;
        let pageNum = 1;
        // Increase scale for High Quality rendering (retina/print ready)
        const RENDER_SCALE = 2.0; 
        const EXPORT_SCALE = 3.0; // Higher for export
        
        let currentFile = null;
        let currentFileType = null; 
        
        // Data Structure for Per-Page Watermarks
        // Key = pageNumber (1,2,3...), Value = JSON of objects
        let pageWatermarks = {}; 

        // --- Initialization ---
        window.onload = function() {
            pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';
            
            canvas = new fabric.Canvas('c', { preserveObjectStacking: true });
            
            // Event Listeners
            canvas.on('selection:created', updateControls);
            canvas.on('selection:updated', updateControls);
            canvas.on('selection:cleared', () => document.getElementById('objectControls').classList.add('hidden'));
            
            // Listen for font change
            document.getElementById('fontFamilyControl').addEventListener('change', function(e) {
                const obj = canvas.getActiveObject();
                if (obj && (obj.type === 'i-text' || obj.type === 'text')) {
                    obj.set('fontFamily', e.target.value);
                    canvas.requestRenderAll();
                }
            });

            renderTemplates();
        };

        // --- Drag & Drop ---
        function handleDragOver(e) {
            e.preventDefault();
            document.getElementById('dropZone').classList.add('drag-active');
        }
        function handleDragLeave(e) {
            e.preventDefault();
            document.getElementById('dropZone').classList.remove('drag-active');
        }
        function handleDrop(e) {
            e.preventDefault();
            document.getElementById('dropZone').classList.remove('drag-active');
            if (e.dataTransfer.files && e.dataTransfer.files[0]) {
                handleFileSelect(e.dataTransfer.files[0]);
            }
        }

        // --- File Handling ---
        async function handleFileSelect(file) {
            if (!file) return;
            showLoading(true);
            currentFile = file;
            document.getElementById('welcomeMessage').classList.add('hidden');
            pageWatermarks = {}; // Reset watermarks for new file
            pageNum = 1;

            if (file.type === 'application/pdf') {
                currentFileType = 'pdf';
                const arrayBuffer = await file.arrayBuffer();
                pdfDoc = await pdfjsLib.getDocument(arrayBuffer).promise;
                document.getElementById('pageCount').textContent = pdfDoc.numPages;
                document.getElementById('pageNav').classList.remove('hidden');
                await renderPage(1);
            } else if (file.type.startsWith('image/')) {
                currentFileType = 'image';
                document.getElementById('pageNav').classList.add('hidden');
                const reader = new FileReader();
                reader.onload = function(f) {
                    fabric.Image.fromURL(f.target.result, function(img) {
                        canvas.setWidth(img.width);
                        canvas.setHeight(img.height);
                        canvas.setBackgroundImage(img, canvas.renderAll.bind(canvas));
                    });
                };
                reader.readAsDataURL(file);
            }
            showLoading(false);
        }

        // --- Page Navigation & State Management ---
        
        function saveCurrentPageState() {
            // Save objects only (not background)
            // If Global Checkbox is ON, we don't need to save per page specifically 
            // because the objects stay on canvas.
            // But if it is OFF, we save to memory.
            if (!document.getElementById('applyAllCheck').checked) {
                const json = canvas.toJSON(['id', 'selectable']);
                pageWatermarks[pageNum] = json.objects; // Save array of objects
            }
        }

        async function renderPage(num) {
            if (!pdfDoc) return;
            
            const page = await pdfDoc.getPage(num);
            const viewport = page.getViewport({scale: RENDER_SCALE});
            
            // Render PDF to canvas
            const canvasEl = document.createElement('canvas');
            const context = canvasEl.getContext('2d');
            canvasEl.height = viewport.height;
            canvasEl.width = viewport.width;
            await page.render({canvasContext: context, viewport: viewport}).promise;
            
            // Set Background
            const pdfImage = canvasEl.toDataURL();
            
            // Load objects logic
            const isGlobal = document.getElementById('applyAllCheck').checked;
            
            // If NOT Global, we clear canvas and try to load specific page data
            if (!isGlobal) {
                canvas.clear(); 
                if (pageWatermarks[num]) {
                    fabric.util.enlivenObjects(pageWatermarks[num], function(objs) {
                        objs.forEach(o => canvas.add(o));
                    });
                }
            }
            
            // Set Background Image (always happens)
            fabric.Image.fromURL(pdfImage, function(img) {
                canvas.setWidth(viewport.width);
                canvas.setHeight(viewport.height);
                canvas.setBackgroundImage(img, canvas.renderAll.bind(canvas));
            });

            document.getElementById('pageNum').textContent = num;
        }

        function changePage(delta) {
            if (!pdfDoc) return;
            const newPage = pageNum + delta;
            if (newPage >= 1 && newPage <= pdfDoc.numPages) {
                saveCurrentPageState(); // Save OLD page before switching
                pageNum = newPage;
                renderPage(pageNum);    // Render NEW page
            }
        }

        // --- Watermark Functions ---
        function addText() {
            const text = new fabric.IText('ข้อความ', {
                left: 100, top: 100,
                fontFamily: 'Sarabun', // Default
                fill: '#000000',
                fontSize: 40 * (currentFileType === 'pdf' ? 1 : 1) 
            });
            canvas.add(text);
            canvas.setActiveObject(text);
        }

        function addImage(input) {
            const file = input.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(f) {
                fabric.Image.fromURL(f.target.result, function(img) {
                    img.scaleToWidth(200);
                    canvas.add(img);
                    canvas.centerObject(img);
                    canvas.setActiveObject(img);
                    input.value = '';
                });
            };
            reader.readAsDataURL(file);
        }

        // --- Controls ---
        function updateControls() {
            const obj = canvas.getActiveObject();
            if (!obj) return;
            
            document.getElementById('objectControls').classList.remove('hidden');
            document.getElementById('opacityControl').value = obj.opacity;
            
            if (obj.type === 'i-text' || obj.type === 'text') {
                document.getElementById('fontControlBox').classList.remove('hidden');
                document.getElementById('colorControl').value = obj.fill;
                document.getElementById('fontFamilyControl').value = obj.fontFamily || 'Sarabun';
            } else {
                document.getElementById('fontControlBox').classList.add('hidden');
            }
        }

        document.getElementById('opacityControl').addEventListener('input', (e) => {
            const obj = canvas.getActiveObject();
            if (obj) { obj.set('opacity', parseFloat(e.target.value)); canvas.requestRenderAll(); }
        });

        document.getElementById('colorControl').addEventListener('input', (e) => {
            const obj = canvas.getActiveObject();
            if (obj && (obj.type === 'i-text' || obj.type === 'text')) { 
                obj.set('fill', e.target.value); 
                canvas.requestRenderAll(); 
            }
        });

        function deleteActiveObject() {
            const obj = canvas.getActiveObject();
            if(obj) canvas.remove(obj);
        }

        // --- Template System (LocalStorage) ---
        function saveTemplate() {
            const name = document.getElementById('templateName').value;
            if (!name) return alert('ใส่ชื่อก่อนนะ');
            const json = JSON.stringify(canvas.toJSON(['id']));
            const data = JSON.parse(json); delete data.backgroundImage;
            
            const templates = JSON.parse(localStorage.getItem('magix_templates') || '{}');
            templates[name] = data;
            localStorage.setItem('magix_templates', JSON.stringify(templates));
            renderTemplates();
            document.getElementById('templateName').value = '';
        }

        function loadTemplate(name) {
            const templates = JSON.parse(localStorage.getItem('magix_templates') || '{}');
            if (templates[name]) {
                const bg = canvas.backgroundImage;
                canvas.loadFromJSON(templates[name], function() {
                    canvas.setBackgroundImage(bg, canvas.renderAll.bind(canvas));
                });
            }
        }

        function deleteTemplate(name) {
            if(!confirm('ลบจริงนะ?')) return;
            const templates = JSON.parse(localStorage.getItem('magix_templates') || '{}');
            delete templates[name];
            localStorage.setItem('magix_templates', JSON.stringify(templates));
            renderTemplates();
        }

        function renderTemplates() {
            const list = document.getElementById('templateList');
            const templates = JSON.parse(localStorage.getItem('magix_templates') || '{}');
            list.innerHTML = '';
            if (Object.keys(templates).length === 0) {
                list.innerHTML = '<p class="text-xs text-gray-400 text-center">ยังไม่มีที่บันทึกไว้</p>';
                return;
            }
            for (const name of Object.keys(templates)) {
                const div = document.createElement('div');
                div.className = 'flex justify-between items-center bg-white px-2 py-1.5 rounded border border-gray-100 text-sm';
                div.innerHTML = `<span class="cursor-pointer flex-1 truncate" onclick="loadTemplate('${name}')">${name}</span><i class="fa-solid fa-xmark text-gray-300 hover:text-red-500 cursor-pointer ml-2" onclick="deleteTemplate('${name}')"></i>`;
                list.appendChild(div);
            }
        }
        
        function backupData() {
            const data = localStorage.getItem('magix_templates');
            saveAs(new Blob([data || '{}'], {type: "application/json"}), "magix_watermark_backup.json");
        }
        
        function restoreData(input) {
            const file = input.files[0];
            if(!file) return;
            const r = new FileReader();
            r.onload = (e) => {
                try { JSON.parse(e.target.result); localStorage.setItem('magix_templates', e.target.result); renderTemplates(); alert('เรียบร้อย!'); } 
                catch(err) { alert('ไฟล์พังอะ'); }
            };
            r.readAsText(file);
        }

        // --- Export System (Improved Quality & Logic) ---
        function toggleRangeInput() {
            const type = document.getElementById('exportRangeType').value;
            document.getElementById('customRangeInput').classList.toggle('hidden', type !== 'custom');
        }

        function getPagesToExport(total) {
            const type = document.getElementById('exportRangeType').value;
            if (type === 'current') return [pageNum];
            if (type === 'all') return Array.from({length: total}, (_, i) => i + 1);
            if (type === 'custom') {
                const txt = document.getElementById('customRangeInput').value;
                const pages = new Set();
                txt.split(',').forEach(part => {
                    if (part.includes('-')) {
                        const [s, e] = part.split('-').map(Number);
                        for (let i = s; i <= e; i++) if (i > 0 && i <= total) pages.add(i);
                    } else {
                        const p = Number(part);
                        if (p > 0 && p <= total) pages.add(p);
                    }
                });
                return Array.from(pages).sort((a,b) => a-b);
            }
            return [1];
        }

        async function exportFile() {
            if (!currentFile) return alert('อัปไฟล์ก่อนสิเตง');
            
            // Save current state first just in case
            saveCurrentPageState(); 

            showLoading(true, 'กำลังเรนเดอร์ High Quality...');
            
            const format = document.getElementById('exportFormat').value;
            const isGlobal = document.getElementById('applyAllCheck').checked;
            const totalPages = currentFileType === 'pdf' ? pdfDoc.numPages : 1;
            const pages = getPagesToExport(totalPages);
            
            // Current objects on screen (used if Global is checked)
            const currentObjectsJSON = canvas.toJSON().objects;

            let pdfExport = null;
            if (format === 'pdf') {
                // Determine orientation based on first page
                pdfExport = new jspdf.jsPDF({
                    orientation: canvas.width > canvas.height ? 'l' : 'p',
                    unit: 'px',
                    format: [canvas.width, canvas.height]
                });
            }
            
            const zip = new JSZip();
            
            // Temporary high-res canvas for rendering
            // We use EXPORT_SCALE which is higher than screen scale
            const tempCanvas = new fabric.Canvas(null);

            for (let i = 0; i < pages.length; i++) {
                const p = pages[i];
                let bgWidth, bgHeight;

                // 1. Prepare Background (High Res)
                if (currentFileType === 'pdf') {
                    const page = await pdfDoc.getPage(p);
                    const viewport = page.getViewport({scale: EXPORT_SCALE}); // High Quality Scale
                    bgWidth = viewport.width;
                    bgHeight = viewport.height;
                    
                    const cEl = document.createElement('canvas');
                    cEl.width = bgWidth; cEl.height = bgHeight;
                    await page.render({canvasContext: cEl.getContext('2d'), viewport}).promise;
                    
                    await new Promise(r => tempCanvas.setBackgroundImage(cEl.toDataURL(), r));
                } else {
                    // Image: Use original size
                    const originalImg = canvas.backgroundImage;
                    bgWidth = originalImg.width;
                    bgHeight = originalImg.height;
                    await new Promise(r => tempCanvas.setBackgroundImage(originalImg, r));
                }
                
                tempCanvas.setWidth(bgWidth);
                tempCanvas.setHeight(bgHeight);

                // 2. Determine which objects to put
                let objectsToAdd = [];
                if (isGlobal) {
                    objectsToAdd = currentObjectsJSON;
                } else {
                    // If local, get from memory. If memory empty, maybe user added nothing to that page.
                    objectsToAdd = pageWatermarks[p] || [];
                }

                // 3. Scale Objects to match High Res Background
                // Screen canvas might be scale 2.0, Export is 3.0. Need to adjust positions/scale.
                const scaleFactor = (currentFileType === 'pdf') ? (EXPORT_SCALE / RENDER_SCALE) : 1;
                
                await new Promise(resolve => {
                    fabric.util.enlivenObjects(objectsToAdd, function(objs) {
                        objs.forEach(o => {
                            // Adjust object for high-res export
                            o.left *= scaleFactor;
                            o.top *= scaleFactor;
                            o.scaleX *= scaleFactor;
                            o.scaleY *= scaleFactor;
                            tempCanvas.add(o);
                        });
                        tempCanvas.renderAll();
                        resolve();
                    });
                });

                // 4. Output
                // Use JPEG quality 1.0 (Max) or PNG
                const dataUrl = tempCanvas.toDataURL({ 
                    format: format === 'pdf' ? 'jpeg' : format, 
                    quality: 1.0, // Max Quality
                    multiplier: 1 // Already scaled via viewport
                });

                if (format === 'pdf') {
                    if (i > 0) pdfExport.addPage([bgWidth, bgHeight]);
                    // jsPDF addImage: width/height in unit (px)
                    pdfExport.addImage(dataUrl, 'JPEG', 0, 0, bgWidth, bgHeight);
                } else {
                    if (pages.length === 1) saveAs(dataUrl, `magix_export_${p}.${format}`);
                    else zip.file(`page_${p}.${format}`, dataUrl.split(',')[1], {base64: true});
                }
                
                tempCanvas.clear();
            }

            if (format === 'pdf') pdfExport.save('magix_document.pdf');
            else if (pages.length > 1 && format !== 'pdf') saveAs(await zip.generateAsync({type:"blob"}), "magix_images.zip");

            showLoading(false);
            alert('Export เรียบร้อย คุณภาพคับแก้ว!');
        }

        function showLoading(show, text) {
            const el = document.getElementById('loading');
            if(text) document.getElementById('loadingText').textContent = text;
            el.style.display = show ? 'flex' : 'none';
        }
    </script>
</body>
</html>
